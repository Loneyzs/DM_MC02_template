# Baseline application configuration for board bring-up.
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_MAIN_STACK_SIZE=2048

# Drivers used by the board template and minimal tests.
CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SPI=y
CONFIG_PWM=y
CONFIG_CAN=y

# Console goes through SEGGER RTT so USART1 remains available to applications.
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n

# Logging and debug visibility.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_RTT=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_THREAD_NAME=y

# BMI088 through the upstream Zephyr bmi08x sensor driver.
CONFIG_SENSOR=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_BMI08X=y
CONFIG_BMI08X_ACCEL_TRIGGER_NONE=y
CONFIG_BMI08X_GYRO_TRIGGER_NONE=y

# Floating point is used by the sensor tests and heater controller.
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y
